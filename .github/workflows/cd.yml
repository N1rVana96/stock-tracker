name: CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # TODO 1: Add permissions to allow pushing packages to GHCR
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image-name.outputs.image }}
      image_latest: ${{ steps.image-name.outputs.image_latest }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests

      # TODO 2: Add a step to run the tests
      - name: Run tests
        run: mvn -B test

      - name: Derive lowercase image name
        id: image-name
        run: |
          REPO_LOWER="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPO_LOWER}:${{ github.sha }}"
          IMAGE_LATEST="ghcr.io/${REPO_LOWER}:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_latest=$IMAGE_LATEST" >> "$GITHUB_OUTPUT"

      # TODO 3: Log in to GHCR using docker/login-action@v3
      #         registry: ghcr.io
      #         username: ${{ github.actor }}
      #         password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # TODO 4: Build and push the image using docker/build-push-action@v5
      #         context: .   push: true
      #         tags: ${{ steps.image-name.outputs.image }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image-name.outputs.image }}
            ${{ steps.image-name.outputs.image_latest }}

  deploy:
    # TODO 5: Make this job depend on build-and-push succeeding
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # TODO 6: Copy docker-compose.yml to ~/stock-app/ on the server
      #         Use appleboy/scp-action@v0.1.7
      #         host, username, key come from secrets
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.yml
          target: ~/stock-app/

      # TODO 7: SSH to the server and run:
      #           cd ~/stock-app
      #           echo "STOCK_APP_IMAGE=<image>" > .env
      #           docker compose pull
      #           docker compose up -d
      #           docker compose ps
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/stock-app
            echo "STOCK_APP_IMAGE=${{ needs.build-and-push.outputs.image }}" > .env
            docker compose pull
            docker compose up -d
            docker compose ps